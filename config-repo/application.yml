# Config común aplicada a TODOS los servicios que importen config del config-server.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9096}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Payload String (JSON crudo) → StringSerializer. La (de)serialización a
      # POJO ocurre dentro de cada handler con Jackson, desacoplando versiones.
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      # Commit del offset tras procesar cada registro con éxito. Si el listener
      # lanza, el DefaultErrorHandler reintenta y finalmente descarta (no auto-commit).
      ack-mode: RECORD

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  pattern:
    # Incluir correlation-id en cada línea de log
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"
  level:
    com.crishof.ecommerce: INFO
