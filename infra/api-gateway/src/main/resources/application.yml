spring:
  application:
    name: api-gateway

  # Config mínima para conectarse a config-server. Las rutas concretas
  # y el resto de configuración se leen desde config-repo/api-gateway.yml
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8889}"

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
